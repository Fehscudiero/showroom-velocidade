    <style>
      /* 🚀 O SEGREDO DO 100/100: LCP SKELETON */
      body {
        background-color: #000;
        margin: 0;
        font-family: 'Rubik', 'Inter', system-ui, sans-serif;
        overflow-x: hidden;
      }
      
      .lcp-skeleton {
        min-height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        background-color: #000;
        box-sizing: border-box;
      }

      .lcp-header {
        height: 64px; /* h-16 mobile */
      }
      @media (min-width: 768px) {
        .lcp-header { height: 96px; /* md:h-24 */ }
      }

      .lcp-content {
        width: 100%;
        max-width: 1440px;
        margin: 0 auto;
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 2rem 1.5rem 4rem 1.5rem; /* px-6 pt-8 pb-16 */
        box-sizing: border-box;
        margin-top: 1rem;
      }
      @media (min-width: 768px) {
        .lcp-content { padding-left: 3rem; padding-right: 3rem; }
      }
      @media (min-width: 1024px) {
        .lcp-content { padding-left: 4rem; padding-right: 4rem; padding-top: 4rem; margin-top: 1rem; }
      }

      .lcp-eyebrow {
        display: flex;
        align-items: center;
        gap: 0.75rem; /* gap-3 */
        margin-bottom: 1.25rem; /* mb-5 */
      }
      @media (min-width: 768px) {
        .lcp-eyebrow { margin-bottom: 1.5rem; /* md:mb-6 */ }
      }

      .lcp-eyebrow-line {
        width: 1.5rem; /* w-6 */
        height: 2px; /* h-0.5 */
        background-color: #EE3F2C; /* primary */
      }
      @media (min-width: 768px) {
        .lcp-eyebrow-line { width: 2rem; /* md:w-8 */ }
      }

      .lcp-eyebrow-text {
        color: #EE3F2C; /* primary */
        font-size: 10px; /* text-[10px] */
        font-weight: 700;
        letter-spacing: 0.1em; /* tracking-widest */
        text-transform: uppercase;
      }
      @media (min-width: 768px) {
        .lcp-eyebrow-text { font-size: 12px; /* md:text-xs */ }
      }
      @media (min-width: 1024px) {
        .lcp-eyebrow-text { font-size: 14px; /* lg:text-sm */ }
      }

      .lcp-h1 {
        color: #fff;
        font-weight: 700;
        line-height: 0.95;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        margin: 0 0 1.5rem 0; /* mb-6 */
        font-size: clamp(40px, 6vw, 72px);
      }

      .lcp-br-desktop { display: none; }
      @media (min-width: 640px) {
        .lcp-br-desktop { display: inline; }
      }
    </style>
